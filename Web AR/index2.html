<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Custom Pokéball with Texture</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="#rock-texture" src="texture/skyblue.png">
      </a-assets>
      
      <a-entity id="reef-group" position="0 0 -5">
  
  <a-dodecahedron src="#rock-texture" radius="2" scale="2 0.6 3" position="0 0 0" material="roughness: 1;"></a-dodecahedron>
  
  <a-icosahedron src="#rock-texture" radius="1.2" scale="1 2.5 1" position="-1.5 1 0.5" rotation="15 30 0" material="roughness: 1;"></a-icosahedron>
  
  <a-dodecahedron src="#rock-texture" radius="0.8" position="1.2 0.2 -0.5" rotation="0 45 20" material="roughness: 1;"></a-dodecahedron>

</a-entity>
      
      <a-marker preset="hiro">
        
        <a-sphere 
          src="#rock-texture" 
          radius="0.6" 
          position="0 0.6 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-sphere>

        </a-marker>

      <a-entity light="type: ambient; color: #fff; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; color: #fff; intensity: 0.6" position="1 3 1"></a-entity>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
