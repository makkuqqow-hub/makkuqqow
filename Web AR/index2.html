<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Custom Pokéball with Texture</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="my-poke-texture" src="texture/skyblue.png">
      </a-assets>
      
 <a-marker preset="hiro">
   
      <a-sphere 
        src="#my-poke-texture" 
        radius="1.2" 
        position="0 1.5 -3"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-sphere>

      <a-sky color="#ECECEC"></a-sky>
      <a-light type="ambient" color="#fff"></a-light>
   
    </a-marker>

      <a-entity light="type: ambient; color: #1d3557; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; color: #a8dadc; intensity: 1.2" position="1 3 1"></a-entity>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
