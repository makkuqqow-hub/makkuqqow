<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coral C</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="backgroundC" src="bg/coral C_bg.png">
        <img id="backgroundC2" src="bg/C_land.png">
        <img id="coralpink" src="bg/C_coral.png">
        <img id="seawead1" src="bg/C_seawead.png">
        <img id="Fish1" src="fishpng/C_Hippocampus.png"> 

        <video id="Fish2Video" src="video/C_Chaetodon wiebeli.mp4" 
               autoplay="true" loop="true" muted="true" playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-image src="#backgroundC" 
               position="0 1.5 -5" 
               width="40" 
               height="30">
      </a-image>

      <a-image src="#backgroundC2" 
               position="0 1.5 -4.5" 
               width="8.5" 
               height="7.5"
               transparent="true">
      </a-image>

    <a-entity position="-0.5 1.4 -2.8"
                animation="property: position; to: 0.8 1.4 -2.8; dur: 10000; dir: alternate; loop: true; easing: easeInOutQuad">
        
        <a-image src="#Fish1" 
                 width="1.0" 
                 height="1.5"
                 transparent="true"
                 look-at="[camera]" material="alphaTest: 0.5; depthWrite: false;"
                 animation__float="property: position; to: 0 0.2 0; dur: 3000; dir: alternate; loop: true; easing: easeInOutSine"
                 animation__rotate="property: rotation; to: 0 0 6; dur: 3500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-image>
      </a-entity>


      <a-entity position="-2.2 2.2 -3.5"
                animation="property: position; to: -0.2 1.6 -3.5; dur: 7000; dir: alternate; loop: true; easing: easeInOutSine">
        
        <a-video src="#Fish2Video" 
                 width="1.3" 
                 height="1.1"
                 material="shader: chromakey; color: 0.1 0.9 0.1; transparent: true; depthWrite: false;">
        </a-video>
        
      </a-entity>

      <a-image src="#coralpink"
               position="-0.6 1.8 -3"
               width="8"
               height="6"
               transparent="true">
      </a-image>

      <a-image src="#seawead1"
               position="-1.8 1.8 -3"
               width="8"
               height="6"
               transparent="true">
      </a-image>

      <a-sky color="#6395b0"></a-sky> 
      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>
  </body>
</html>
