<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coral C</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="backgroundC" src="bg/coral C_bg.png">
        <img id="backgroundC2" src="bg/C_land.png">
        <img id="coralpink" src="bg/C_coral.png">
        <img id="Fish1" src="fishpng/C_Hippocampus.png"> 
        <img id="Fish2" src="fishpng/C_Chaetodon wiebeli.png"> 
      </a-assets>

      <a-image src="#backgroundC" 
               position="0 1.5 -5" 
               width="40" 
               height="30">
      </a-image>

      <a-image src="#backgroundC2" 
               position="0 1.5 -4.5" 
               width="8.5" 
               height="7.5"
               transparent="true">
      </a-image>

     <a-entity position="-0.5 1.5 -3.5"
                animation="property: position; to: 1.2 1.5 -3.5; dur: 8000; dir: alternate; loop: true; easing: easeInOutQuad">
        
        <a-image src="#Fish1" 
                 width="1.2" 
                 height="1.8"
                 transparent="true"
                 look-at="[camera]"
                 material="alphaTest: 0.5; depthWrite: false;"
                 animation__float="property: position; to: 0 0.15 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
                 animation__rotate="property: rotation; to: 0 0 8; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-image>
      </a-entity>


      <a-entity position="-1.5 1.0 -3.8"
                animation="property: position; to: 1.5 2.0 -3.8; dur: 5000; dir: alternate; loop: true; easing: easeInOutQuad">
        
        <a-image src="#Fish2" 
                 width="1.2" 
                 height="0.6"
                 transparent="true"
                 look-at="[camera]"
                 material="alphaTest: 0.5; depthWrite: false;"
                 animation__float="property: position; to: 0 0.08 0; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine"
                 animation__wiggle="property: rotation; to: 0 15 0; dur: 800; dir: alternate; loop: true; easing: easeInOutSine">
        </a-image>
      </a-entity>


      <a-image src="#coralpink"
               position="-0.6 1.8 -3"
               width="8"
               height="6"
               transparent="true">
      </a-image>

      <a-sky color="#6395b0"></a-sky> 
      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>
  </body>
</html>
