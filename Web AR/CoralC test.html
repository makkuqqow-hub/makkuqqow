<a-entity position="-0.5 1.5 -3.5"
                animation="property: position; to: 1.2 1.5 -3.5; dur: 8000; dir: alternate; loop: true; easing: easeInOutQuad">
        
        <a-image src="#Fish1" 
                 width="1.2" 
                 height="1.8"
                 transparent="true"
                 look-at="[camera]"
                 material="alphaTest: 0.5; depthWrite: false;"
                 animation__float="property: position; to: 0 0.15 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
                 animation__rotate="property: rotation; to: 0 0 8; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-image>
      </a-entity>


      <a-entity position="-1.5 1.0 -3.8"
                animation="property: position; to: 1.5 2.0 -3.8; dur: 5000; dir: alternate; loop: true; easing: easeInOutQuad">
        
        <a-image src="#Fish2" 
                 width="1.2" 
                 height="0.6"
                 transparent="true"
                 look-at="[camera]"
                 material="alphaTest: 0.5; depthWrite: false;"
                 animation__float="property: position; to: 0 0.08 0; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine"
                 animation__wiggle="property: rotation; to: 0 15 0; dur: 800; dir: alternate; loop: true; easing: easeInOutSine">
        </a-image>
      </a-entity>
