<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>我的魚類生態AR場景 - 動畫版</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="fish-main" src="https://files.catbox.moe/ter0fn.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        
        <a-gltf-model src="#fish-main" 
                      position="0 0.5 0" 
                      rotation="0 0 0" 
                      scale="0.3 0.3 0.3"
                      animation-mixer>
        </a-gltf-model>
        <a-circle rotation="-90 0 0" radius="2" color="#0a192f" opacity="0.8"></a-circle>

        <a-cylinder position="-1 0.5 -1" radius="0.1" height="1" color="#4CC3D9"></a-cylinder>
        <a-cylinder position="1 0.3 1" radius="0.15" height="0.6" color="#FFC107"></a-cylinder>
        <a-box position="-0.8 0.2 0.8" width="0.3" height="0.3" depth="0.3" color="#E91E63"></a-box>

      </a-marker>

      <a-entity light="type: ambient; color: #1d3557; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; color: #a8dadc; intensity: 1.2" position="1 3 1"></a-entity>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
