<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coral D - AR Mode</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <video id="backgroundD" src="video/D_bgvideo.mp4" autoplay loop muted playsinline></video>
        <img id="myFish" src="img/fish.png"> 
      </a-assets>

      <a-marker preset="hiro">
        
        <a-video src="#backgroundD" 
                 width="4" 
                 height="2.25" 
                 position="0 1.5 -2"
                 rotation="-90 0 0">
        </a-video>

        <a-entity position="0 1 -1"
                  animation="property: position; to: 1 1 -1; dur: 8000; dir: alternate; loop: true; easing: easeInOutQuad">
          
          <a-image src="#myFish" 
                   width="0.6" 
                   height="0.6"
                   transparent="true"
                   look-at="[camera]"
                   animation__float="property: position; from: 0 0 0; to: 0 0.1 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
                   animation__rotate="property: rotation; to: 0 0 8; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine">
          </a-image>
          
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>

      
      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>
  </body>
</html>
