<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coral D</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <video id="backgroundD" src="video/D_bgvideo.mp4" autoplay loop muted playsinline></video>
        <img id="myFish" src="img/fish.png"> 
      </a-assets>

      <a-entity position="-0.5 0.5 0.2"
                animation="property: position; to: 0.8 0.5 -0.2; dur: 7000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-video src="#backgroundD" 
                 width="1.2" 
                 height="0.9">
        </a-video>
      </a-entity>

      <a-entity position="0 1.5 -3"
                animation="property: position; to: 2 1.5 -3; dur: 8000; dir: alternate; loop: true; easing: easeInOutQuad">
        
        <a-image src="#myFish" 
                 width="1.2" 
                 height="1.2"
                 transparent="true"
                 look-at="[camera]"
                 animation__float="property: position; to: 0 0.15 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
                 animation__rotate="property: rotation; to: 0 0 8; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-image>
        
      </a-entity>

      <a-sky src="#backgroundD"></a-sky> 
      
      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>
  </body>
</html>
