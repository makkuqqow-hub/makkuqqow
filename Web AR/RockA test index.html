<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame AR 海底場景</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>    
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script>
      // 這裡保留你寫的 'underwater-shader'
      AFRAME.registerShader('underwater-shader', {
        schema: {
          srcSand: {type: 'map', is: 'uniform'},
          srcCaustics: {type: 'map', is: 'uniform'},
          opacity: {type: 'number', default: 1.0},
          time: {type: 'time', is: 'uniform'}
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D srcSand;
          uniform sampler2D srcCaustics;
          uniform float opacity;
          uniform float time;
          void main() {
            vec4 sandColor = texture2D(srcSand, vUv);
            vec2 causticsUv = vUv + vec2(sin(time / 2000.0) * 0.02, cos(time / 2000.0) * 0.02);
            vec4 causticsColor = texture2D(srcCaustics, causticsUv * 2.0);
            vec3 mixedColor = sandColor.rgb * causticsColor.rgb;
            gl_FragColor = vec4(mixedColor, opacity * sandColor.a);
          }
        `
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="sand-texture" src="texture/beachsand.jpg" crossorigin="anonymous">
        <img id="caustics-texture" src="texture/underwater ripples.jpg" crossorigin="anonymous">
        <a-asset-item id="reef-model" src="glb/rockA.glb"></a-asset-item>
        <a-asset-item id="fishA-model1" src="glb/A_mackerel.glb"></a-asset-item>
        <a-asset-item id="fishA-model2" src="glb/mm_project.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
        
        <a-plane id="sand-plane"
                 width="3" height="3"
                 position="0 0 0"
                 rotation="-90 0 0"
                 material="src: #sand-texture; repeat: 2 2; color: #f0e6d6"> 
        </a-plane>

        <a-plane id="caustics-overlay"
                 width="3" height="3"
                 position="0 0.01 0" 
                 rotation="-90 0 0"
                 material="src: #caustics-texture; transparent: true; opacity: 0.6; blending: multiply">
        </a-plane>
        
        <a-gltf-model id="reef"
                      src="#reef-model"
                      position="0.8 0 -0.8" 
                      scale="0.8 0.3 0.8"
                      rotation="0 0 0">
        </a-gltf-model>

        <a-gltf-model src="#fishA-model1"
                      position="0.4 0.4 0" 
                      scale="0.08 0.08 0.08"
                      rotation="0 0 0"
                      animation-mixer>
        </a-gltf-model>
        
        <a-gltf-model id="patrol-fish"
                      src="#fishA-model2"
                      position="1.2 0.4 1.2" 
                      scale="0.08 0.08 0.08"
                      rotation="0 0 0"
                      animation-mixer>
        </a-gltf-model>
        
        <script>
          document.querySelector('#reef').addEventListener('model-loaded', function (evt) {
            var texture = new THREE.TextureLoader().load('texture/rock.jpg'); 
            evt.detail.model.traverse(function (node) {
              if (node.isMesh) {
                node.material.map = texture;
                node.material.needsUpdate = true;
              }
            });
          });
        </script>

      </a-marker>
      
      <a-entity camera></a-entity>

      <script>
        // 用一個定時器不斷檢查場景是否準備好，避開 loaded 事件被錯過的問題
        var checkExist = setInterval(function() {
          const fish = document.querySelector('#patrol-fish');
          
          if (fish) {
            clearInterval(checkExist); // 抓到魚了，停止檢查，開始執行巡邏
            startPatrol(fish);
          }
        }, 100);

        function startPatrol(fish) {
          // 定義 3x3 沙灘四周的四個角落路徑點 (X, Y, Z)
          const waypoints = [
            { x: 1.2,  y: 0.4, z: 1.2 },   // 角落 A (右上)
            { x: 1.2,  y: 0.4, z: -1.2 },  // 角落 B (右下)
            { x: -1.2, y: 0.4, z: -1.2 },  // 角落 C (左下)
            { x: -1.2, y: 0.4, z: 1.2 }    // 角落 D (左上)
          ];
          
          let currentTargetIndex = 1; // 從第二個點（右下）開始游
          const speed = 0.01; // 游動速度，0.01 是很剛好的速度

          function tick() {
            let currentPos = fish.getAttribute('position');
            let target = waypoints[currentTargetIndex];

            // 計算與目標點的距離
            let dx = target.x - currentPos.x;
            let dz = target.z - currentPos.z;
            let distance = Math.sqrt(dx * dx + dz * dz);

            // 如果快游到角落了，就換下一個目標點
            if (distance < 0.1) {
              currentTargetIndex = (currentTargetIndex + 1) % waypoints.length;
              requestAnimationFrame(tick);
              return;
            }

            // 朝目標點推進
            let moveX = currentPos.x + (dx / distance) * speed;
            let moveZ = currentPos.z + (dz / distance) * speed;
            
            // 【修復】這裡不能用 this.el，要直接操作抓到的 fish 變數
            fish.setAttribute('position', { x: moveX, y: currentPos.y, z: moveZ });

            // 自動計算魚頭朝向
            let angle = Math.atan2(dx, dz);
            let angleDeg = THREE.MathUtils.radToDeg(angle);
            
            // 【修復】這裡加上 90 度修正模型的初始偏向
            fish.setAttribute('rotation', { x: 0, y: angleDeg + 90, z: 0 });

            requestAnimationFrame(tick);
          }

          // 正式啟動無限循環
          requestAnimationFrame(tick);
        }
      </script>

    </a-scene>
  </body>
</html>
