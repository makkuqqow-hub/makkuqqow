<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame AR 海底場景</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>    
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // 這裡保留你寫的 'underwater-shader' (略，保持不變)
      AFRAME.registerShader('underwater-shader', {
        schema: {
          srcSand: {type: 'map', is: 'uniform'},
          srcCaustics: {type: 'map', is: 'uniform'},
          opacity: {type: 'number', default: 1.0},
          time: {type: 'time', is: 'uniform'}
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D srcSand;
          uniform sampler2D srcCaustics;
          uniform float opacity;
          uniform float time;
          void main() {
            vec4 sandColor = texture2D(srcSand, vUv);
            vec2 causticsUv = vUv + vec2(sin(time / 2000.0) * 0.02, cos(time / 2000.0) * 0.02);
            vec4 causticsColor = texture2D(srcCaustics, causticsUv * 2.0);
            vec3 mixedColor = sandColor.rgb * causticsColor.rgb;
            gl_FragColor = vec4(mixedColor, opacity * sandColor.a);
          }
        `
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="sand-texture" src="texture/beachsand.jpg" crossorigin="anonymous">
        <img id="caustics-texture" src="texture/underwater ripples.jpg" crossorigin="anonymous">
        <a-asset-item id="reef-model" src="glb/rockA.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">

        <a-plane id="sand-plane"
                 width="3" height="3"
                 position="0 0 0"
                 rotation="-90 0 0"
                 material="src: #sand-texture; repeat: 2 2; color: #f0e6d6"> 
        </a-plane>

        <a-plane id="caustics-overlay"
                 width="3" height="3"
                 position="0 0.01 0" 
                 rotation="-90 0 0"
                 material="src: #caustics-texture; transparent: true; opacity: 0.6; blending: multiply">
        </a-plane>
        
        <a-gltf-model src="#reef-model"
                      position="0.8 0 -0.8" 
                      scale="0.8 0.3 0"
                      rotation="0 0 0">
        </a-gltf-model>

        <a-entity id="placeholder-fish-school" position="-0.6 0.4 0">
          <a-entity geometry="primitive: sphere; radius: 0.05" material="color: #4169e1" position="0 0 0"></a-entity>
          <a-entity geometry="primitive: sphere; radius: 0.05" material="color: #4682b4" position="-0.15 0.1 -0.05"></a-entity>
          <a-entity geometry="primitive: sphere; radius: 0.05" material="color: #6495ed" position="0 -0.05 0"></a-entity>
          <a-entity geometry="primitive: sphere; radius: 0.05" material="color: #4169e1" position="0.15 0.05 0.05"></a-entity>
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
