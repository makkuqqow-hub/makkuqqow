<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame 海底場景實現</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script>
      AFRAME.registerShader('underwater-shader', {
        schema: {
          srcSand: {type: 'map', is: 'uniform'},
          srcCaustics: {type: 'map', is: 'uniform'},
          opacity: {type: 'number', default: 1.0},
          time: {type: 'time', is: 'uniform'} // 用於波光動畫
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D srcSand;
          uniform sampler2D srcCaustics;
          uniform float opacity;
          uniform float time;

          void main() {
            vec4 sandColor = texture2D(srcSand, vUv);
            // 讓波光貼圖隨時間輕微移動，模擬水面波動
            vec2 causticsUv = vUv + vec2(sin(time / 2000.0) * 0.02, cos(time / 2000.0) * 0.02);
            vec4 causticsColor = texture2D(srcCaustics, causticsUv * 2.0); // 縮放貼圖

            // 使用乘法 (Multiply) 模式混合，這最能模擬水光效果
            vec3 mixedColor = sandColor.rgb * causticsColor.rgb;
            gl_FragColor = vec4(mixedColor, opacity * sandColor.a);
          }
        `
      });
    </script>
  </head>
  <body>
    <a-scene background="color: white">
      <a-assets>
        <img id="sand-texture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/sand/sand_texture.jpg" crossorigin="anonymous">
        <img id="caustics-texture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/lighting/caustics.jpg" crossorigin="anonymous">
        
        </a-assets>

     <a-plane id="sand-plane"
         width="12" height="12"
         position="0 -2 -5"
         rotation="-90 45 0"
         material="src: #sand-texture; repeat: 4 4; color: #f0e6d6"> 
</a-plane>
      <a-plane id="caustics-overlay"
               width="12" height="12"
               position="0 -1.98 -5" rotation="-90 45 0"
               material="src: #caustics-texture; transparent: true; opacity: 0.6; blending: multiply">
      </a-plane>

      <a-entity id="placeholder-rock"
                geometry="primitive: octahedron; radius: 1.5; detail: 1"
                position="3 0.5 -3"
                scale="1.5 2 1.5"
                material="color: #696969; roughness: 0.8">
      </a-entity>

      <a-entity id="placeholder-fish-school" position="-4 1 -6">
        <a-entity geometry="primitive: sphere; radius: 0.2" material="color: #4169e1" position="0 0 0" rotation="0 90 0"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.2" material="color: #4682b4" position="-0.5 0.3 -0.2" rotation="0 95 0"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.2" material="color: #6495ed" position="0 -0.2 0" rotation="0 85 0"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.2" material="color: #4169e1" position="0.6 0.1 0.1" rotation="0 90 0"></a-entity>
        </a-entity>

      <a-camera position="0 3 0" user-height="1.6">
        <a-cursor></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
